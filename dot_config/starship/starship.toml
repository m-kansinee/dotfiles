# Minimal, fast, context-aware prompt

add_newline = false

format = """
$username$hostname$directory$git_branch$git_status$aws$gcloud$python$nodejs$cmd_duration$line_break$character
"""

# === Directory ===
[directory]
style = "blue"
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 1
format = "[ $path]($style) "

# === Git ===
[git_branch]
symbol = " "
style = "bold cyan"
format = " [ $branch]($style)"

[git_status]
style = "red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "✖"
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# === Python ===
[python]
style = "yellow"
format = '[ $version]($style) '
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "uv.lock"]
detect_extensions = ["py"]

# === Node ===
[nodejs]
style = "green"
format = '[ $version]($style) '
detect_files = ["package.json", ".node-version", ".nvmrc"]

# === Cloud ===
[aws]
style = "yellow"
format = '[ $profile($region)]($style) '
disabled = false
force_display = false

[gcloud]
style = "blue"
format = '[ gcp:$active]($style) '

# === Command duration ===
[cmd_duration]
min_time = 500
style = "dimmed white"
format = '[ $duration]($style) '

# === Prompt character ===
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# === Username / Hostname (SSH only) ===
[username]
show_always = false
style_user = "yellow bold"
style_root = "red bold"
format = "[$user]($style)"
disabled = false

[hostname]
ssh_only = true
style = "bold green"
format = "[@$hostname]($style) "
disabled = false
